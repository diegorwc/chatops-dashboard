 <!DOCTYPE html>
 <html lang="pt-br">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>ChatOps Monitoramento</title>
     <!-- Script essencial para Mini Apps -->
     <script src="https://telegram.org/js/telegram-web-app.js"></script>
     <style>
         body {
             font-family: sans-serif;
             background-color: var(--tg-theme-bg-color, #ffffff);
             color: var(--tg-theme-text-color, #222222);
             padding: 20px;
             display: flex;
             flex-direction: column;
             align-items: center;
         }
         .status-card {
             background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
             border-radius: 10px;
             padding: 15px;
             margin: 10px;
             width: 90%;
             box-shadow: 0 2px 5px rgba(0,0,0,0.1);
         }
         .btn {
             background-color: var(--tg-theme-button-color, #2481cc);
             color: var(--tg-theme-button-text-color, #ffffff);
             border: none;
             padding: 10px 20px;
             border-radius: 5px;
             cursor: pointer;
             margin-top: 20px;
         }
     </style>
 </head>
 <body>
     <h1>Painel de Redes 🌐</h1>
     
     <div class="status-card">
         <strong>Fortigate:</strong> <span style="color: green;">✅ Online</span>
     </div>
     
     <div class="status-card">
         <strong>Samba DC:</strong> <span style="color: green;">✅ Online</span>
     </div>

     <button class="btn" onclick="fecharApp()">Fechar Painel</button>

     <script>
         // Inicializa o Mini App
         const tg = window.Telegram.WebApp;
         tg.expand(); // Abre o app em tela cheia

         function fecharApp() {
             tg.close();
         }
     </script>
 </body>
 </html>
