<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatOps Dashboard</title>
    <!-- Script v6.9+ essencial para compatibilidade desktop -->
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; margin-bottom: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Painel de Controle 🌐</h3>
    <button class="btn" onclick="send('ping_dc_controlador')">📡 Testar Servidor</button>
    <button class="btn" onclick="send('ping_fortigate')">🛡️ Testar Gateway</button>
    <button class="btn" style="background: #e67e22;" onclick="send('ansible_menu')">🛠️ Menu Ansible</button>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Garante a inicialização em todas as plataformas
        tg.ready();
        tg.expand();

        function send(cmd) {
            try {
                // Tenta enviar o dado. No Desktop, o sendData é restrito.
                tg.sendData(cmd);
            } catch (e) {
                // Fallback para quando o sendData falha
                tg.showAlert("Erro de envio. Tente abrir pelo botão de menu.");
            }
        }
    </script>
</body>
</html>
