<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatOps Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; color: #333; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; margin-bottom: 12px; font-weight: bold; }
        #status { font-size: 0.8rem; color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h3>Painel de Controle 🌐</h3>
    <p id="status">Verificando ambiente...</p>
    
    <button class="btn" onclick="send('ping_fortigate')">Testar Gateway</button>
    <button class="btn" onclick="send('ping_dc_controlador')">Testar Servidor</button>
    <button class="btn" style="background: #666;" onclick="tg.close()">Fechar</button>

    <script>
        const tg = window.Telegram.WebApp;
        
        try {
            tg.expand();
            tg.ready();
            document.getElementById('status').innerText = "Sistema pronto (v" + tg.version + ")";
        } catch (e) {
            document.getElementById('status').innerText = "Aguardando inicialização...";
        }

        function send(cmd) {
            tg.showAlert("Enviando requisição: " + cmd);
            try {
                tg.sendData(cmd);
            } catch (e) {
                tg.showAlert("Erro: Use o botão de menu ou teclado fixo.");
            }
        }
    </script>
</body>
</html>
